name: Repackage Dify Plugin

on:
  workflow_dispatch:
    inputs:
      plugin_author:
        description: "plugin author"
        required: true
        type: string
        default: "langgenius"
      plugin_name:
        description: "plugin name"
        required: true
        type: string
        default: "oaicompat_dify_model"
      plugin_version:
        description: "plugin version"
        required: true
        type: string
        default: "0.0.10"
      platform_arm:
        description: "Use ARM platform (true = manylinux_2_28_aarch64, false = manylinux_2_28_x86_64)"
        required: true
        type: choice
        default: "false"
        options:
          - "false"
          - "true"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  repackage:
    runs-on: ubuntu-latest

    steps:
      - name: Print workflow inputs
        run: |
          echo "plugin_author  = ${{ inputs.plugin_author }}"
          echo "plugin_name    = ${{ inputs.plugin_name }}"
          echo "plugin_version = ${{ inputs.plugin_version }}"
          echo "platform_arm   = ${{ inputs.platform_arm }}"

      - name: Resolve platform
        run: |
          if [ "${{ inputs.platform_arm }}" = "true" ]; then
            echo "PIP_PLATFORM=manylinux_2_28_aarch64" >> "$GITHUB_ENV"
            echo "PACKAGE_SUFFIX=offline-arm" >> "$GITHUB_ENV"
          else
            echo "PIP_PLATFORM=manylinux_2_28_x86_64" >> "$GITHUB_ENV"
            echo "PACKAGE_SUFFIX=offline" >> "$GITHUB_ENV"
          fi

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Show resolved platform
        run: |
          echo "PIP_PLATFORM=$PIP_PLATFORM"
          echo "PACKAGE_SUFFIX=$PACKAGE_SUFFIX"
          python --version
          pip --version

      - name: Make plugin_repackaging.sh executable
        run: chmod +x ./plugin_repackaging.sh

      - name: Run plugin repackaging script
        env:
          PIP_MIRROR_URL: https://pypi.org/simple
        run: |
          ./plugin_repackaging.sh \
            -p "$PIP_PLATFORM" \
            -s "$PACKAGE_SUFFIX" \
            market \
            "${{ inputs.plugin_author }}" \
            "${{ inputs.plugin_name }}" \
            "${{ inputs.plugin_version }}"

      - name: Find repackaged artifact
        run: |
          ARTIFACT_PATH=$(find . -type f -name "*-${PACKAGE_SUFFIX}.difypkg" | head -n 1)

          if [ -z "$ARTIFACT_PATH" ]; then
            echo "No *-${PACKAGE_SUFFIX}.difypkg artifact found!"
            echo "Files in workspace:"
            find . -maxdepth 3 -type f | sort
            exit 1
          fi

          echo "ARTIFACT_PATH=$ARTIFACT_PATH" >> "$GITHUB_ENV"
          echo "ARTIFACT_NAME=$(basename "$ARTIFACT_PATH")" >> "$GITHUB_ENV"

          echo "Found artifact: $ARTIFACT_PATH"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_PATH }}
